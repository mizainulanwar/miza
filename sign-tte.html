<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validasi Surat Madrasah | MIZA</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1ggCDeDWm_U36NAwNXVocmeSDto6PH9LT">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .loader { border: 4px solid #f3f3f3; border-radius: 50%; border-top: 4px solid #10b981; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-lg w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <!-- Header -->
        <div class="bg-emerald-700 p-6 text-center text-white">
            <img src="https://lh3.googleusercontent.com/d/1nn76pgqhGHG_hfj_ASbSEPgQiaDs93S8" alt="Logo Lembaga" class="h-16 w-auto mx-auto mb-3 object-contain">
            <h1 class="text-2xl font-bold tracking-wide">Portal Validasi E-Surat</h1>
            <p class="text-emerald-100 text-sm mt-1">Sistem Verifikasi Dokumen Resmi MI Zainul Anwar</p>
        </div>

        <!-- Content Area -->
        <div id="contentArea" class="p-8">
            <div class="text-center py-8">
                <div class="loader mb-4"></div>
                <p class="text-gray-600 font-medium">Memverifikasi keaslian dokumen...</p>
                <p class="text-xs text-gray-400 mt-2">Mohon tunggu sebentar</p>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-xs text-gray-500">© <span id="year"></span> Sistem Surat Terintegrasi</p>
            <p class="text-xs text-gray-500">Madrasah Ibtidaiyah Zainul Anwar</p>
        </div>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        
        const encodedUrl = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J4d2VPRHRoRTZSckRhMmNiRHZsWkVibDJkaERmSzRXUXJLZlRKNHM4QWRLajNJLWV1bGh3Y2xaNXNaRlMzY29iRHkvZXhlYw==";
        const GAS_API_URL = atob(encodedUrl);

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('verify');

            if(token) {
                fetch(`${GAS_API_URL}?api=true&verify=${token}`)
                    .then(response => response.json())
                    .then(data => tampilkanHasil(data))
                    .catch(error => {
                        console.error("Error fetching validation data:", error);
                        tampilkanError();
                    });
            } else {
                tampilkanError("Token validasi tidak ditemukan di URL.");
            }
        };

        function tampilkanHasil(res) {
            const content = document.getElementById('contentArea');
            if(res.valid) {
                content.innerHTML = `
                    <div class="fade-in text-center">
                        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100 mb-6 border-4 border-green-500">
                            <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-900 mb-2">DOKUMEN VALID</h2>
                        <p class="text-sm text-gray-500 mb-6 border-b pb-6">Surat ini tercatat sah dan telah ditandatangani secara elektronik oleh Kepala Madrasah.</p>
                        
                        <div class="text-left bg-gray-50 p-4 rounded-lg border border-gray-200">
                            <div class="mb-3">
                                <p class="text-xs text-gray-500 font-bold uppercase">Nomor Surat</p>
                                <p class="text-sm font-semibold text-gray-900">${res.noSurat}</p>
                            </div>
                            <div class="mb-3">
                                <p class="text-xs text-gray-500 font-bold uppercase">Perihal</p>
                                <p class="text-sm text-gray-800">${res.perihal}</p>
                            </div>
                            <div class="mb-3">
                                <p class="text-xs text-gray-500 font-bold uppercase">Tujuan</p>
                                <p class="text-sm text-gray-800">${res.tujuan}</p>
                            </div>
                            <div class="mb-3">
                                <p class="text-xs text-gray-500 font-bold uppercase">Disetujui Pada</p>
                                <p class="text-sm font-medium text-blue-700">${res.tglApprove}</p>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 font-bold uppercase">Dibuat Oleh</p>
                                <p class="text-sm text-gray-800">${res.pembuat}</p>
                            </div>
                        </div>

                        <!-- Tombol Lihat Dokumen -->
                        <div class="mt-6 text-center">
                            <a href="${res.finalUrl}" target="_blank" class="inline-flex items-center justify-center w-full px-4 py-2.5 text-sm font-semibold text-white transition-colors bg-emerald-600 rounded-lg hover:bg-emerald-700 focus:ring-2 focus:ring-emerald-500 focus:ring-offset-1 shadow-sm">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                Lihat Dokumen Asli
                            </a>
                        </div>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="fade-in text-center py-6">
                        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-red-100 mb-6 border-4 border-red-500">
                            <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </div>
                        <h2 class="text-xl font-bold text-red-700 mb-2">DOKUMEN TIDAK DITEMUKAN</h2>
                        <p class="text-gray-600 text-sm">${res.message || "Token validasi tidak dikenali atau dokumen ini palsu."}</p>
                    </div>
                `;
            }
        }

        function tampilkanError(msg) {
            const content = document.getElementById('contentArea');
            content.innerHTML = `
                <div class="text-center py-6">
                    <p class="text-red-500 font-bold mb-2">Terjadi Kesalahan.</p>
                    <p class="text-gray-500 text-sm">${msg || "Gagal menghubungi server database madrasah."}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
