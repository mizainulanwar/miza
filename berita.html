<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berita & Artikel Madrasah</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1ggCDeDWm_U36NAwNXVocmeSDto6PH9LT">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        madrasah: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d', 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .loader {
            border-top-color: #16a34a;
            -webkit-animation: spinner 1s linear infinite;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .wa-pulse {
            animation: pulse-green 2s infinite;
        }
        .berita-card:hover .berita-img {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen relative">
    <div id="wa-wrapper"></div>
    <div id="navbar-wrapper"></div>

    <header class="relative pt-32 pb-20 md:pt-40 md:pb-24 flex items-center justify-center text-white overflow-hidden">
        <div id="hero-bg" class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 scale-105" style="background-color: #14532d;"></div>
        <div class="absolute inset-0 bg-madrasah-900/90"></div>

        <div class="relative z-10 max-w-7xl mx-auto px-4 text-center">
            <span class="inline-block py-1.5 px-5 rounded-full bg-yellow-400/20 text-yellow-400 font-bold text-sm tracking-widest mb-4 uppercase border border-yellow-400/50">Kabar Madrasah</span>
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold mb-4 tracking-tight drop-shadow-xl">Berita & Artikel</h1>
            <p class="text-lg text-gray-200 max-w-2xl mx-auto font-light">Dapatkan informasi terbaru, pengumuman, dan artikel menarik seputar kegiatan lembaga kami.</p>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full relative z-20 bg-gray-50 rounded-t-[2.5rem] -mt-12 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] mb-16 min-h-[500px]">
        
        <div class="max-w-2xl mx-auto mb-12">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 group-focus-within:text-madrasah-600 transition-colors"></i>
                </div>
                <input type="text" id="search-input" class="bg-white border-2 border-gray-200 text-gray-900 text-lg rounded-full focus:ring-madrasah-500 focus:border-madrasah-500 block w-full pl-12 p-4 shadow-sm transition-all outline-none" placeholder="Cari judul berita atau kategori...">
            </div>
            <p class="text-center text-sm text-gray-500 mt-3" id="search-info">Menampilkan semua berita</p>
        </div>

        <div id="loading-berita" class="flex justify-center py-16">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-madrasah-600 h-16 w-16"></div>
        </div>
        <div id="error-berita" class="hidden text-center text-red-500 font-bold py-10 w-full"></div>
        <div id="container-berita" class="grid gap-6 md:gap-8 sm:grid-cols-2 lg:grid-cols-3 hidden">
        </div>

        <div id="empty-berita" class="hidden text-center py-12">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gray-100 text-gray-400 rounded-full mb-4 text-3xl">
                <i class="fa-regular fa-folder-open"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-700 mb-2">Berita Tidak Ditemukan</h3>
            <p class="text-gray-500">Coba ubah kata kunci pencarian Anda.</p>
        </div>

        <div class="text-center mt-12">
            <button id="btn-load-berita" class="hidden bg-white border-2 border-madrasah-600 text-madrasah-700 font-bold py-3 px-8 rounded-full hover:bg-madrasah-600 hover:text-white transition-all shadow-sm mx-auto flex items-center">
                Muat Lebih Banyak <i class="fa-solid fa-angle-down ml-2"></i>
            </button>
        </div>

    </main>
    <div id="footer-wrapper"></div>
    <script src="assets/js/api.js"></script>
    <script>
        let allBeritaData = [];      
        let filteredBeritaData = []; 
        let currentPage = 1;
        const limitPerPage = 6;      

        async function loadBeritaPage() {
            await loadCommonProfilData(); 

            const container = document.getElementById('container-berita');
            const loading = document.getElementById('loading-berita');
            
            const data = await fetchData('getBerita');
            loading.style.display = 'none';

            if (data && data.length > 0) {
                allBeritaData = data.filter(b => b.Status && b.Status.toLowerCase() === 'publish').reverse();
                
                filteredBeritaData = [...allBeritaData]; 
                currentPage = 1;
                
                renderBerita(false); 
            } else {
                document.getElementById('empty-berita').classList.remove('hidden');
            }
        }

        function renderBerita(isAppend = false) {
            const container = document.getElementById('container-berita');
            const btnLoad = document.getElementById('btn-load-berita');
            const emptyState = document.getElementById('empty-berita');

            if(filteredBeritaData.length === 0) {
                container.classList.add('hidden');
                btnLoad.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            const startIndex = (currentPage - 1) * limitPerPage;
            const endIndex = startIndex + limitPerPage;
            const currentData = filteredBeritaData.slice(startIndex, endIndex);

            let htmlString = '';
            currentData.forEach(item => {
                const fallbackImg = "https://via.placeholder.com/600x400/16a34a/ffffff?text=Berita+Madrasah";
                const imgUrl = item.Link_Gambar_Thumbnail || fallbackImg;
                
                const detailUrl = `detail-berita.html?id=${encodeURIComponent(item.ID)}`;
                
                htmlString += `
                    <div onclick="window.location.href='${detailUrl}'" class="berita-card bg-white rounded-2xl shadow-sm overflow-hidden hover:shadow-xl transition-all duration-300 border border-gray-100 flex flex-col group cursor-pointer">
                        <div class="relative overflow-hidden aspect-video">
                            <img src="${imgUrl}" alt="${item.Judul}" class="berita-img w-full h-full object-cover transition-transform duration-700" onerror="this.src='${fallbackImg}'">
                            <div class="absolute top-4 left-4 bg-madrasah-600 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-md uppercase tracking-wide">${item.Kategori || 'Umum'}</div>
                        </div>
                        <div class="p-6 flex-grow flex flex-col">
                            <div class="text-sm text-gray-400 font-medium mb-3 flex items-center"><i class="fa-regular fa-clock mr-2"></i> ${item.Tanggal || '-'}</div>
                            <h3 class="text-xl font-bold text-gray-900 mb-3 group-hover:text-madrasah-600 transition-colors leading-tight">${item.Judul || 'Tanpa Judul'}</h3>
                            <p class="text-gray-600 text-sm mb-5 flex-grow line-clamp-3 leading-relaxed">${item.Ringkasan || 'Tidak ada ringkasan.'}</p>
                            <span class="text-madrasah-600 font-bold self-start mt-auto flex items-center group-hover:translate-x-2 transition-transform">Baca Artikel <i class="fa-solid fa-arrow-right-long ml-2"></i></span>
                        </div>
                    </div>
                `;
            });

            if (isAppend) {
                container.innerHTML += htmlString;
            } else {
                container.innerHTML = htmlString;
            }

            if (endIndex < filteredBeritaData.length) {
                btnLoad.classList.remove('hidden');
                btnLoad.onclick = () => {
                    currentPage++;
                    renderBerita(true);
                };
            } else {
                btnLoad.classList.add('hidden');
            }
        }

        const searchInput = document.getElementById('search-input');
        const searchInfo = document.getElementById('search-info');

        searchInput.addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase().trim();
            
            if (searchTerm === '') {
                filteredBeritaData = [...allBeritaData];
                searchInfo.textContent = `Menampilkan semua berita`;
            } else {
                filteredBeritaData = allBeritaData.filter(item => {
                    const judul = (item.Judul || '').toLowerCase();
                    const kategori = (item.Kategori || '').toLowerCase();
                    return judul.includes(searchTerm) || kategori.includes(searchTerm);
                });
                searchInfo.textContent = `Menemukan ${filteredBeritaData.length} berita untuk "${searchTerm}"`;
            }
            
            currentPage = 1;
            renderBerita(false);
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderLayout();
            loadBeritaPage();
        });
    </script>
</body>
</html>
