<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membaca Berita - Madrasah</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1ggCDeDWm_U36NAwNXVocmeSDto6PH9LT">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        madrasah: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d', 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .loader {
            border-top-color: #16a34a;
            -webkit-animation: spinner 1s linear infinite;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .wa-pulse {
            animation: pulse-green 2s infinite;
        }
        #detail-konten p {
            margin-bottom: 1.5rem;
        }
        #detail-konten ul, #detail-konten ol {
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
        }
        #detail-konten ul { list-style-type: disc; }
        #detail-konten ol { list-style-type: decimal; }
        #detail-konten a { color: #16a34a; text-decoration: underline; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen relative">
    <div id="wa-wrapper"></div>
    <div id="navbar-wrapper"></div>

    <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-28 md:py-32 w-full relative z-20 bg-white shadow-xl sm:rounded-2xl sm:my-10 min-h-[70vh]">
        
        <div class="mb-8 border-b border-gray-100 pb-4">
            <a href="berita.html" class="text-madrasah-600 hover:text-madrasah-800 font-semibold inline-flex items-center transition-colors">
                <i class="fa-solid fa-arrow-left-long mr-2"></i> Kembali ke Daftar Berita
            </a>
        </div>

        <div id="loading-detail" class="flex justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-madrasah-600 h-16 w-16"></div>
        </div>

        <div id="error-detail" class="hidden text-center py-16">
            <i class="fa-solid fa-file-circle-xmark text-7xl text-gray-300 mb-6 block"></i>
            <h2 class="text-3xl font-extrabold text-gray-800 mb-4">Berita Tidak Ditemukan</h2>
            <p class="text-lg text-gray-600 mb-8">Maaf, artikel yang Anda cari mungkin telah dihapus atau tautannya salah.</p>
            <a href="berita.html" class="inline-block bg-madrasah-600 text-white font-bold py-3 px-8 rounded-full hover:bg-madrasah-700 transition-colors shadow-md">Jelajahi Berita Lainnya</a>
        </div>

        <article id="content-detail" class="hidden">
            <header class="mb-8 text-center md:text-left">
                <span id="detail-kategori" class="bg-madrasah-100 text-madrasah-700 font-bold px-4 py-1.5 rounded-full text-xs uppercase tracking-widest inline-block mb-4 border border-madrasah-200">Kategori</span>
                <h1 id="detail-judul" class="text-3xl md:text-5xl font-extrabold text-gray-900 mb-6 leading-tight">Memuat Judul...</h1>
                <div class="flex items-center justify-center md:justify-start text-gray-500 font-medium">
                    <i class="fa-regular fa-calendar-days mr-2"></i> <span id="detail-tanggal">Tanggal</span>
                </div>
            </header>

            <figure class="w-full aspect-video rounded-3xl overflow-hidden mb-12 shadow-lg bg-gray-100 relative group">
                <img id="detail-gambar" src="" alt="Thumbnail Berita" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
            </figure>

            <div id="detail-konten" class="text-lg text-gray-700 leading-relaxed text-justify">
            </div>
            
            <div class="mt-16 pt-8 border-t-2 border-dashed border-gray-200">
                <h4 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-4">Bagikan Artikel Ini:</h4>
                <div class="flex space-x-3">
                    <button onclick="shareToWhatsApp()" class="bg-green-500 text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-green-600 transition-colors shadow-sm" title="Bagikan ke WhatsApp"><i class="fa-brands fa-whatsapp text-xl"></i></button>
                    <button onclick="shareToFacebook()" class="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-blue-700 transition-colors shadow-sm" title="Bagikan ke Facebook"><i class="fa-brands fa-facebook-f text-xl"></i></button>
                    <button onclick="copyLink()" class="bg-gray-700 text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-gray-800 transition-colors shadow-sm" title="Salin Tautan"><i class="fa-solid fa-link text-xl"></i></button>
                </div>
            </div>
        </article>

    </main>
    <div id="footer-wrapper"></div>
    <script src="assets/js/api.js"></script>
    <script>
        async function initDetailBeritaPage() {
            await loadCommonProfilData(); 
            await loadDetailBerita();
        }

        async function loadDetailBerita() {
            const urlParams = new URLSearchParams(window.location.search);
            const beritaId = urlParams.get('id');

            const loading = document.getElementById('loading-detail');
            const errorDiv = document.getElementById('error-detail');
            const contentDiv = document.getElementById('content-detail');

            if (!beritaId) {
                loading.style.display = 'none';
                errorDiv.classList.remove('hidden');
                return;
            }

            const data = await fetchData('getBerita');
            loading.style.display = 'none';

            if (data && data.length > 0) {
                const beritaDitemukan = data.find(b => String(b.ID) === String(beritaId));

                if (beritaDitemukan) {
                    document.title = `${beritaDitemukan.Judul} - Madrasah`;

                   document.getElementById('detail-kategori').textContent = beritaDitemukan.Kategori || 'Umum';
                    document.getElementById('detail-judul').textContent = beritaDitemukan.Judul || 'Tanpa Judul';
                    document.getElementById('detail-tanggal').textContent = beritaDitemukan.Tanggal || '-';
                    
                    const fallbackImg = "https://via.placeholder.com/1200x600/16a34a/ffffff?text=Berita+Madrasah";
                    const imgEl = document.getElementById('detail-gambar');
                    imgEl.src = beritaDitemukan.Link_Gambar_Thumbnail || fallbackImg;
                    imgEl.onerror = () => { imgEl.src = fallbackImg; };

                    const kontenAsli = beritaDitemukan.Konten || 'Konten berita belum tersedia.';
                    if(kontenAsli.includes('<p>') || kontenAsli.includes('<br>')) {
                        document.getElementById('detail-konten').innerHTML = kontenAsli;
                    } else {
                        const formatParagraf = kontenAsli.split('\n')
                                                .filter(p => p.trim() !== '')
                                                .map(p => `<p>${p}</p>`)
                                                .join('');
                        document.getElementById('detail-konten').innerHTML = formatParagraf;
                    }

                    contentDiv.classList.remove('hidden');

                } else {
                    errorDiv.classList.remove('hidden');
                }
            } else {
                errorDiv.classList.remove('hidden');
            }
        }

        const currentUrl = encodeURIComponent(window.location.href);
        
        function getJudulForShare() {
            return encodeURIComponent(document.getElementById('detail-judul').textContent);
        }

        function shareToWhatsApp() {
            const text = `Baca artikel menarik ini: *${getJudulForShare()}*\n\n${decodeURIComponent(currentUrl)}`;
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        function shareToFacebook() {
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${currentUrl}`, '_blank', 'width=600,height=400');
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('Tautan artikel berhasil disalin!');
            }).catch(err => {
                console.error('Gagal menyalin:', err);
                const textArea = document.createElement("textarea");
                textArea.value = window.location.href;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('Tautan artikel berhasil disalin!');
                } catch (err) {
                    alert('Gagal menyalin tautan secara otomatis.');
                }
                document.body.removeChild(textArea);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderLayout();
            initDetailBeritaPage();
        });
    </script>
</body>
</html>
