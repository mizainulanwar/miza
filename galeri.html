<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Kegiatan - Madrasah</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1ggCDeDWm_U36NAwNXVocmeSDto6PH9LT">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        madrasah: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d', 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .loader {
            border-top-color: #16a34a;
            -webkit-animation: spinner 1s linear infinite;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .wa-pulse {
            animation: pulse-green 2s infinite;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen relative">
    <div id="wa-wrapper"></div>
    <div id="navbar-wrapper"></div>

    <header class="relative pt-32 pb-20 md:pt-40 md:pb-24 flex items-center justify-center text-white overflow-hidden">
        <div id="hero-bg" class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 scale-105" style="background-color: #14532d;"></div>
        <div class="absolute inset-0 bg-madrasah-900/90"></div>

        <div class="relative z-10 max-w-7xl mx-auto px-4 text-center">
            <span class="inline-block py-1.5 px-5 rounded-full bg-yellow-400/20 text-yellow-400 font-bold text-sm tracking-widest mb-4 uppercase border border-yellow-400/50">DOKUMENTASI</span>
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold mb-4 tracking-tight drop-shadow-xl">Galeri Kegiatan</h1>
            <p class="text-lg text-gray-200 max-w-2xl mx-auto font-light">Kumpulan momen dan dokumentasi kegiatan terbaik di madrasah kami.</p>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full relative z-20 bg-gray-50 rounded-t-[2.5rem] -mt-12 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] mb-16 min-h-[500px]">
        
        <div class="max-w-2xl mx-auto mb-12">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                    <i class="fa-solid fa-image text-gray-400 group-focus-within:text-madrasah-600 transition-colors"></i>
                </div>
                <input type="text" id="search-input" class="bg-white border-2 border-gray-200 text-gray-900 text-lg rounded-full focus:ring-madrasah-500 focus:border-madrasah-500 block w-full pl-12 p-4 shadow-sm transition-all outline-none" placeholder="Cari judul foto atau kategori kegiatan...">
            </div>
            <p class="text-center text-sm text-gray-500 mt-3" id="search-info">Menampilkan seluruh koleksi foto</p>
        </div>

        <div id="loading-galeri" class="flex justify-center py-16">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-madrasah-600 h-16 w-16"></div>
        </div>

        <div id="error-galeri" class="hidden text-center text-red-500 font-bold py-10 w-full"></div>

        <div id="container-galeri" class="grid gap-4 grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-4 hidden">
        </div>

        <div id="empty-galeri" class="hidden text-center py-12">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gray-100 text-gray-400 rounded-full mb-4 text-3xl">
                <i class="fa-regular fa-images"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-700 mb-2">Foto Tidak Ditemukan</h3>
            <p class="text-gray-500">Kategori atau judul foto yang Anda cari mungkin tidak ada.</p>
        </div>

        <div class="text-center mt-12">
            <button id="btn-load-galeri" class="hidden bg-white border-2 border-madrasah-600 text-madrasah-700 font-bold py-3 px-8 rounded-full hover:bg-madrasah-600 hover:text-white transition-all shadow-sm mx-auto flex items-center">
                Muat Lebih Banyak <i class="fa-solid fa-angle-down ml-2"></i>
            </button>
        </div>

    </main>

    <div id="lightbox-modal" class="fixed inset-0 z-[100] bg-black/95 hidden flex-col justify-center items-center opacity-0 transition-opacity duration-300">
        <button id="lightbox-close" class="absolute top-6 right-6 text-white hover:text-yellow-400 text-4xl focus:outline-none transition-colors">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <img id="lightbox-img" src="" alt="Galeri Full" class="max-w-[90%] max-h-[85vh] object-contain rounded-lg shadow-2xl transform scale-95 transition-transform duration-300">
        <div id="lightbox-caption" class="text-white mt-4 text-center max-w-2xl px-4">
            <h4 id="lightbox-title" class="font-bold text-xl text-yellow-400"></h4>
            <p id="lightbox-category" class="text-sm text-gray-300 mt-1"></p>
        </div>
    </div>

    <div id="footer-wrapper"></div>
    <script src="assets/js/api.js"></script>
    <script>
        let allGaleriData = [];      
        let filteredGaleriData = []; 
        let currentPage = 1;
        const limitPerPage = 12;

        async function initGaleriPage() {
            await loadCommonProfilData(); 

            const container = document.getElementById('container-galeri');
            const loading = document.getElementById('loading-galeri');
            const errorDiv = document.getElementById('error-galeri');

            const data = await fetchData('getGaleri');
            loading.style.display = 'none';

            if (data && data.length > 0) {
                allGaleriData = data.reverse(); 
                filteredGaleriData = [...allGaleriData];
                currentPage = 1;
                
                renderGaleri(false);
            } else {
                document.getElementById('empty-galeri').classList.remove('hidden');
            }
        }

        function renderGaleri(isAppend = false) {
            const container = document.getElementById('container-galeri');
            const btnLoad = document.getElementById('btn-load-galeri');
            const emptyState = document.getElementById('empty-galeri');

            if(filteredGaleriData.length === 0) {
                container.classList.add('hidden');
                btnLoad.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            const startIndex = (currentPage - 1) * limitPerPage;
            const endIndex = startIndex + limitPerPage;
            const currentData = filteredGaleriData.slice(startIndex, endIndex);

            let htmlString = '';
            currentData.forEach(item => {
                const fallbackImg = "https://via.placeholder.com/600x600/e2e8f0/64748b?text=Foto+Madrasah";
                const imgUrl = item.Link_Gambar || fallbackImg;
                
                const safeImgUrl = imgUrl.replace(/'/g, "\\'");
                const safeTitle = (item.Judul_Foto || 'Tanpa Judul').replace(/'/g, "\\'");
                const safeCategory = (item.Kategori || 'Galeri').replace(/'/g, "\\'");

                htmlString += `
                    <div onclick="openLightbox('${safeImgUrl}', '${safeTitle}', '${safeCategory}')" class="group relative overflow-hidden rounded-2xl shadow-sm hover:shadow-xl transition-all aspect-square cursor-pointer bg-gray-200">
                        <img src="${imgUrl}" alt="${item.Judul_Foto}" loading="lazy" class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" onerror="this.src='${fallbackImg}'">
                        <div class="absolute inset-0 bg-gradient-to-t from-madrasah-900/90 via-madrasah-900/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4 md:p-6">
                            <span class="text-yellow-400 text-xs font-bold uppercase tracking-wider mb-2 transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 delay-100">${item.Kategori || 'Galeri'}</span>
                            <h4 class="text-white font-bold text-sm md:text-lg leading-tight transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 line-clamp-2">${item.Judul_Foto || 'Tanpa Judul'}</h4>
                        </div>
                        <div class="absolute top-3 right-3 md:top-4 md:right-4 bg-black/50 text-white w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <i class="fa-solid fa-expand text-sm md:text-base"></i>
                        </div>
                    </div>
                `;
            });

            if (isAppend) {
                container.innerHTML += htmlString;
            } else {
                container.innerHTML = htmlString;
            }

            if (endIndex < filteredGaleriData.length) {
                btnLoad.classList.remove('hidden');
                btnLoad.onclick = () => {
                    currentPage++;
                    renderGaleri(true);
                };
            } else {
                btnLoad.classList.add('hidden');
            }
        }

        const searchInput = document.getElementById('search-input');
        const searchInfo = document.getElementById('search-info');

        searchInput.addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase().trim();
            
            if (searchTerm === '') {
                filteredGaleriData = [...allGaleriData];
                searchInfo.textContent = `Menampilkan seluruh koleksi foto`;
            } else {
                filteredGaleriData = allGaleriData.filter(item => {
                    const judul = (item.Judul_Foto || '').toLowerCase();
                    const kategori = (item.Kategori || '').toLowerCase();
                    return judul.includes(searchTerm) || kategori.includes(searchTerm);
                });
                searchInfo.textContent = `Menemukan ${filteredGaleriData.length} foto untuk "${searchTerm}"`;
            }
            
            currentPage = 1;
            renderGaleri(false);
        });

        const lightbox = document.getElementById('lightbox-modal');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxTitle = document.getElementById('lightbox-title');
        const lightboxCategory = document.getElementById('lightbox-category');
        const lightboxClose = document.getElementById('lightbox-close');

        function openLightbox(imgSrc, title, category) {
            lightboxImg.src = imgSrc;
            lightboxTitle.textContent = title;
            lightboxCategory.textContent = category;
            
            lightbox.classList.remove('hidden');
            setTimeout(() => {
                lightbox.classList.remove('opacity-0');
                lightboxImg.classList.remove('scale-95');
                lightboxImg.classList.add('scale-100');
            }, 10);
            
            document.body.style.overflow = 'hidden'; 
        }

        function closeLightbox() {
            lightbox.classList.add('opacity-0');
            lightboxImg.classList.remove('scale-100');
            lightboxImg.classList.add('scale-95');
            
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightboxImg.src = '';
            }, 300);
            
            document.body.style.overflow = 'auto'; 
        }

        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !lightbox.classList.contains('hidden')) {
                closeLightbox();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderLayout();
            initGaleriPage();
        });
    </script>
</body>
</html>
