<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Resmi Madrasah</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1ggCDeDWm_U36NAwNXVocmeSDto6PH9LT">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        madrasah: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .loader {
            border-top-color: #16a34a;
            -webkit-animation: spinner 1s linear infinite;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .misi-list li {
            padding-left: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .misi-list li::marker {
            font-weight: 700;
            color: #16a34a;
        }
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .wa-pulse {
            animation: pulse-green 2s infinite;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen relative">
    <div id="wa-wrapper"></div>
    <div id="navbar-wrapper"></div>

    <header class="relative pt-32 pb-20 md:pt-40 md:pb-24 flex items-center justify-center text-white overflow-hidden">
        <div id="hero-bg" class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 scale-105" style="background-color: #14532d;"></div>
        <div class="absolute inset-0 bg-madrasah-900/90"></div>

        <div class="relative z-10 max-w-7xl mx-auto px-4 text-center">
            <span class="inline-block py-1.5 px-5 rounded-full bg-yellow-400/20 text-yellow-400 font-bold text-sm tracking-widest mb-4 uppercase border border-yellow-400/50">Tentang Kami</span>
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold mb-4 tracking-tight drop-shadow-xl">Profil Madrasah</h1>
            <p class="text-lg text-gray-200 max-w-2xl mx-auto font-light">Mengenal lebih dekat sejarah, visi, misi, dan identitas lembaga kami.</p>
        </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full relative z-20 bg-white rounded-t-[2.5rem] -mt-12 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] mb-16">
        
        <div id="loading-profil" class="flex justify-center py-16">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-madrasah-600 h-16 w-16"></div>
        </div>

        <div id="container-profil" class="hidden space-y-20">
            
            <section id="sambutan" class="scroll-mt-24">
                <div class="flex flex-col md:flex-row items-center md:items-start gap-10">
                    <div class="w-56 h-56 md:w-72 md:h-72 flex-shrink-0 relative">
                        <img id="profil-foto-kepsek" src="" alt="Kepala Sekolah" class="w-full h-full object-cover rounded-2xl shadow-xl relative z-10">
                        <div class="absolute inset-0 rounded-2xl bg-madrasah-600 transform translate-x-4 translate-y-4 z-0"></div>
                    </div>
                    <div class="flex-1 text-center md:text-left pt-4">
                        <h2 class="text-3xl font-extrabold text-madrasah-900 mb-2">Sambutan Kepala Madrasah</h2>
                        <div class="w-16 h-1 bg-yellow-400 mb-6 mx-auto md:mx-0"></div>
                        <i class="fa-solid fa-quote-left text-4xl text-madrasah-100 mb-4 inline-block"></i>
                        <p id="profil-sambutan" class="text-lg text-gray-600 italic mb-6 leading-relaxed font-light text-justify"></p>
                        <h4 id="profil-nama-kepsek" class="text-xl font-bold text-gray-900 mb-1"></h4>
                        <p class="text-madrasah-600 font-semibold text-sm">Kepala Madrasah</p>
                    </div>
                </div>
            </section>

            <section id="sejarah-section" class="hidden scroll-mt-24">
                <div class="bg-gray-50 rounded-3xl p-8 md:p-12 border border-gray-100">
                    <div class="flex items-center mb-6">
                        <div class="w-12 h-12 bg-madrasah-100 text-madrasah-600 rounded-xl flex items-center justify-center text-2xl mr-4 shadow-sm">
                            <i class="fa-solid fa-clock-rotate-left"></i>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-bold text-madrasah-900">Sejarah Singkat</h2>
                    </div>
                    <div id="profil-sejarah" class="text-gray-700 leading-relaxed space-y-4 text-justify">
                    </div>
                </div>
            </section>

            <section id="visi-misi" class="scroll-mt-24">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-extrabold text-madrasah-900 mb-2">Visi & Misi</h2>
                    <div class="w-16 h-1 bg-yellow-400 mx-auto"></div>
                </div>
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="bg-madrasah-800 text-white rounded-3xl shadow-lg p-10 relative overflow-hidden">
                        <i class="fa-solid fa-eye absolute -right-4 -bottom-4 text-8xl text-madrasah-700 opacity-50"></i>
                        <h3 class="text-2xl font-bold text-yellow-400 mb-6 flex items-center relative z-10">
                            <i class="fa-solid fa-star mr-3"></i> Visi
                        </h3>
                        <p id="profil-visi" class="text-xl leading-relaxed relative z-10 font-medium text-gray-50"></p>
                    </div>

                    <div class="bg-white rounded-3xl shadow-lg p-10 border border-gray-100 relative overflow-hidden">
                        <i class="fa-solid fa-bullseye absolute -right-4 -bottom-4 text-8xl text-gray-50 opacity-80"></i>
                        <h3 class="text-2xl font-bold text-madrasah-900 mb-6 flex items-center relative z-10">
                            <i class="fa-solid fa-list-check text-madrasah-600 mr-3"></i> Misi
                        </h3>
                        <div id="profil-misi-container" class="text-gray-700 relative z-10">
                        </div>
                    </div>
                </div>
            </section>

            <section id="info-tambahan" class="scroll-mt-24 border-t-2 border-dashed border-gray-200 pt-16">
                <div class="text-center mb-10">
                    <h2 class="text-2xl font-bold text-madrasah-900 mb-2">Informasi Administrasi Kelembagaan</h2>
                    <p class="text-gray-500">Detail identitas resmi madrasah.</p>
                </div>
                <div class="grid sm:grid-cols-2 gap-y-6 gap-x-8 text-gray-600" id="profil-lainnya">
                </div>
            </section>

        </div>
    </main>
    <div id="footer-wrapper"></div>
    <script src="assets/js/api.js"></script>
    <script>
        async function loadProfilPage() {
            const data = await loadCommonProfilData(); 
            
            document.getElementById('loading-profil').style.display = 'none';
            const container = document.getElementById('container-profil');
            container.classList.remove('hidden');

            if (data && Object.keys(data).length > 0) {
                
                if(data.isi_sambutan) {
                    const formatSambutan = String(data.isi_sambutan).replace(/\n/g, '<br><br>');
                    document.getElementById('profil-sambutan').innerHTML = formatSambutan;
                }
                if(data.nama_kepala_sekolah) document.getElementById('profil-nama-kepsek').textContent = data.nama_kepala_sekolah;
                
                const fotoKepsekEl = document.getElementById('profil-foto-kepsek');
                if(data.foto_kepala_sekolah) {
                    fotoKepsekEl.src = data.foto_kepala_sekolah;
                } else {
                    fotoKepsekEl.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.nama_kepala_sekolah || 'Kepala Sekolah')}&background=16a34a&color=fff&size=512`;
                }

                if(data.visi_sekolah) document.getElementById('profil-visi').textContent = data.visi_sekolah;
                if(data.misi_sekolah) {
                    const containerMisi = document.getElementById('profil-misi-container');
                    const ul = document.createElement('ul');
                    ul.className = "list-decimal list-inside space-y-3 font-medium misi-list text-justify";
                    
                    const barisMisi = String(data.misi_sekolah).split('\n');
                    barisMisi.forEach(misiText => {
                        const teksBersih = misiText.trim();
                        if(teksBersih !== '') {
                            const teksTanpaAngkaAwal = teksBersih.replace(/^[0-9]+[\.\)\-]\s*/, '');
                            const li = document.createElement('li');
                            li.textContent = teksTanpaAngkaAwal;
                            ul.appendChild(li);
                        }
                    });
                    containerMisi.appendChild(ul);
                }

                if(data.sejarah || data.sejarah_singkat) {
                    const sejarahText = data.sejarah || data.sejarah_singkat;
                    const formatSejarah = String(sejarahText).replace(/\n/g, '<br><br>');
                    document.getElementById('profil-sejarah').innerHTML = `<p>${formatSejarah}</p>`;
                    document.getElementById('sejarah-section').classList.remove('hidden');
                }

                const keysDikecualikan = [
                    'logo_sekolah', 'bg_hero_section', 'visi_sekolah', 'misi_sekolah', 
                    'isi_sambutan', 'nama_kepala_sekolah', 'foto_kepala_sekolah', 
                    'nama_sekolah', 'singkatan', 'alamat_sekolah', 'telepon_madrasah', 'email_sekolah',
                    'link_embed_peta', 'latar_belakang_singkat', 'sejarah_singkat', 'telepon_sekolah'
                ];

                const containerLainnya = document.getElementById('profil-lainnya');
                let infoCount = 0;
                
                for (const [key, value] of Object.entries(data)) {
                    if(keysDikecualikan.includes(key.toLowerCase())) continue; 

                    const formattedKey = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                    const htmlContent = `
                        <div class="flex flex-col border-b border-gray-100 pb-3">
                            <span class="text-xs text-gray-400 font-bold uppercase tracking-widest mb-1">${formattedKey}</span>
                            <span class="font-semibold text-gray-800 break-words">${value}</span>
                        </div>
                    `;
                    containerLainnya.innerHTML += htmlContent;
                    infoCount++;
                }

                if (infoCount === 0) {
                    document.getElementById('info-tambahan').classList.add('hidden');
                }

            } else {
                container.innerHTML = '<p class="text-center text-red-500 font-bold w-full">Gagal memuat profil atau data kosong.</p>';
            }
        }


        document.addEventListener('DOMContentLoaded', () => {
            renderLayout();
            loadProfilPage();
        });
    </script>
</body>
</html>
