<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenaga Pendidik & Kependidikan - Madrasah</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1ggCDeDWm_U36NAwNXVocmeSDto6PH9LT">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        madrasah: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d', 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .loader {
            border-top-color: #16a34a;
            -webkit-animation: spinner 1s linear infinite;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .wa-pulse {
            animation: pulse-green 2s infinite;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen relative">
    <div id="wa-wrapper"></div>
    <div id="navbar-wrapper"></div>

    <header class="relative pt-32 pb-20 md:pt-40 md:pb-24 flex items-center justify-center text-white overflow-hidden">
        <div id="hero-bg" class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 scale-105" style="background-color: #14532d;"></div>
        <div class="absolute inset-0 bg-madrasah-900/90"></div>

        <div class="relative z-10 max-w-7xl mx-auto px-4 text-center">
            <span class="inline-block py-1.5 px-5 rounded-full bg-yellow-400/20 text-yellow-400 font-bold text-sm tracking-widest mb-4 uppercase border border-yellow-400/50">SDM KAMI</span>
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold mb-4 tracking-tight drop-shadow-xl">Tenaga Pendidik & Kependidikan</h1>
            <p class="text-lg text-gray-200 max-w-2xl mx-auto font-light">Mengenal lebih dekat para pahlawan tanpa tanda jasa dan staf dedikatif di madrasah kami.</p>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full relative z-20 bg-gray-50 rounded-t-[2.5rem] -mt-12 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] mb-16 min-h-[500px]">
        
        <div class="max-w-2xl mx-auto mb-12">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 group-focus-within:text-madrasah-600 transition-colors"></i>
                </div>
                <input type="text" id="search-input" class="bg-white border-2 border-gray-200 text-gray-900 text-lg rounded-full focus:ring-madrasah-500 focus:border-madrasah-500 block w-full pl-12 p-4 shadow-sm transition-all outline-none" placeholder="Cari nama guru, staff, atau jabatan...">
            </div>
            <p class="text-center text-sm text-gray-500 mt-3" id="search-info">Menampilkan seluruh SDM</p>
        </div>

        <div id="loading-guru" class="flex justify-center py-16">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-madrasah-600 h-16 w-16"></div>
        </div>

        <div id="error-guru" class="hidden text-center text-red-500 font-bold py-10 w-full"></div>

        <div id="container-guru" class="grid gap-6 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 hidden">
        </div>

        <div id="empty-guru" class="hidden text-center py-12">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gray-100 text-gray-400 rounded-full mb-4 text-3xl">
                <i class="fa-solid fa-user-xmark"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-700 mb-2">Profil Tidak Ditemukan</h3>
            <p class="text-gray-500">Coba gunakan kata kunci lain, seperti nama panggilan atau jabatan.</p>
        </div>

        <div class="text-center mt-12">
            <button id="btn-load-guru" class="hidden bg-white border-2 border-madrasah-600 text-madrasah-700 font-bold py-3 px-8 rounded-full hover:bg-madrasah-600 hover:text-white transition-all shadow-sm mx-auto flex items-center">
                Tampilkan Lebih Banyak <i class="fa-solid fa-angle-down ml-2"></i>
            </button>
        </div>

    </main>

    <div id="footer-wrapper"></div>
    <script src="assets/js/api.js"></script>
    <script>
        let allGuruData = [];      
        let filteredGuruData = []; 
        let currentPage = 1;
        const limitPerPage = 8;

        async function initGuruPage() {
            await loadCommonProfilData(); 

            const container = document.getElementById('container-guru');
            const loading = document.getElementById('loading-guru');
            const errorDiv = document.getElementById('error-guru');

            const data = await fetchData('getGuru');
            loading.style.display = 'none';

            if (data && data.length > 0) {
                allGuruData = data;
                filteredGuruData = [...allGuruData];
                currentPage = 1;
                
                renderGuru(false);
            } else {
                document.getElementById('empty-guru').classList.remove('hidden');
            }
        }

        function renderGuru(isAppend = false) {
            const container = document.getElementById('container-guru');
            const btnLoad = document.getElementById('btn-load-guru');
            const emptyState = document.getElementById('empty-guru');

            if(filteredGuruData.length === 0) {
                container.classList.add('hidden');
                btnLoad.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            const startIndex = (currentPage - 1) * limitPerPage;
            const endIndex = startIndex + limitPerPage;
            const currentData = filteredGuruData.slice(startIndex, endIndex);

            let htmlString = '';
            currentData.forEach(item => {
                const fallbackFoto = "https://ui-avatars.com/api/?name=" + encodeURIComponent(item.Nama_Lengkap || 'Guru') + "&background=f3f4f6&color=16a34a&size=300&bold=true";
                const fotoUrl = item.Link_Foto || fallbackFoto;
                
                const waliKelasLabel = item.Wali_Kelas ? `<div class="mt-3 text-xs bg-yellow-100 text-yellow-800 font-bold px-3 py-1.5 rounded-full inline-block uppercase tracking-wide border border-yellow-200">Wali Kelas ${item.Wali_Kelas}</div>` : '';

                htmlString += `
                    <div class="text-center bg-white p-6 md:p-8 rounded-3xl border border-gray-100 hover:shadow-xl hover:border-madrasah-100 transition-all duration-300 flex flex-col items-center group">
                        <div class="relative w-32 h-32 mb-5">
                            <img src="${fotoUrl}" alt="${item.Nama_Lengkap}" class="w-full h-full rounded-full object-cover border-4 border-gray-50 shadow-md group-hover:border-madrasah-500 transition-colors duration-300 relative z-10" onerror="this.src='${fallbackFoto}'">
                            <div class="absolute inset-0 bg-madrasah-500 rounded-full scale-110 opacity-0 group-hover:opacity-20 transition-opacity duration-300 z-0"></div>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 group-hover:text-madrasah-700 transition-colors">${item.Nama_Lengkap || 'Nama Tidak Diketahui'}</h3>
                        <p class="text-sm text-madrasah-600 font-medium mt-1">${item.Jabatan || '-'}</p>
                        ${waliKelasLabel}
                    </div>
                `;
            });

            if (isAppend) {
                container.innerHTML += htmlString;
            } else {
                container.innerHTML = htmlString;
            }

            if (endIndex < filteredGuruData.length) {
                btnLoad.classList.remove('hidden');
                btnLoad.onclick = () => {
                    currentPage++;
                    renderGuru(true);
                };
            } else {
                btnLoad.classList.add('hidden');
            }
        }

        const searchInput = document.getElementById('search-input');
        const searchInfo = document.getElementById('search-info');

        searchInput.addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase().trim();
            
            if (searchTerm === '') {
                filteredGuruData = [...allGuruData];
                searchInfo.textContent = `Menampilkan seluruh SDM`;
            } else {
                filteredGuruData = allGuruData.filter(item => {
                    const nama = (item.Nama_Lengkap || '').toLowerCase();
                    const jabatan = (item.Jabatan || '').toLowerCase();
                    const walikelas = (item.Wali_Kelas || '').toLowerCase();
                    return nama.includes(searchTerm) || jabatan.includes(searchTerm) || walikelas.includes(searchTerm);
                });
                searchInfo.textContent = `Menemukan ${filteredGuruData.length} profil untuk "${searchTerm}"`;
            }
            
            currentPage = 1;
            renderGuru(false);
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            renderLayout();
            initGuruPage(); 
        });        
    </script>
</body>
</html>
